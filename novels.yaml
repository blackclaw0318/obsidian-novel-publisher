# ============================================================
# obsidian-novel-publisher — 多本小说注册表
# v0.3.2 P0 引入
# 老板可手编, 改后 commit 即可 (publisher 启动时读)
# ============================================================

novels:
  # ============================================================
  # 第 1 本 — 碳与道 (7-9 00:50 新开, 1 卷 5 章 短篇)
  # 测试: P0-P6 全套链路 + multi-novel runner
  # ============================================================
  - id: carbon_tao_obsidian
    title: 碳与道
    slug: carbon-tao
    description: 一个有机化学博士生意外合成 C₉₉ 簇, 吸入后细胞重组 — 现代化学实验室里的硬核修仙者。
    status: ongoing
    enabled: true            # 7-9 测试期间开启
    daily_chapter: true      # 8/12/18 三档都为本本写章
    target_word_count: 3000
    category: 科幻
    keywords: [现代, 化学, 修仙, 日常, 碳簇, 硬科幻]
    # ============ Volume 配置 (支持多卷) ============
    volumes:
      - order: 1
        title: "第一卷: 异常合成"
        description: 31 天里, 一个化学博士从理性走向炼体, 最后拒绝秩序。
        start_chapter: 1
        end_chapter: 5         # v0.2 起 (2026-07-10): ch5 已推完, 第二卷手工加; publisher 仍无自动开卷逻辑, 下一卷需手动补
      - order: 2
        title: "第二卷: 碳笼飞升"
        description: C₉₉ 簇改写细胞之后, 从练气到大乘, 化学博士以碳笼为基重构修仙体系。
        start_chapter: 6
        end_chapter: 10
      # ============================================================
      # 第三卷 (2026-07-15 老板拍板, 50 章)
      # 标题待老板拍 (黑出 3 候选: A 金丹问道 / B 碳道永生 / C 天网恢恢)
      # ============================================================
      - order: 3
        title: "第三卷: 金丹问道"
        description: 金丹期之后, 林昭在国安 9 局局长陈士则的追猎下, 以碳笼元婴对抗秩序, 从问道到渡劫到飞升。
        start_chapter: 11
        end_chapter: 60          # 50 章 (11-60)
    # ============ chapter slug 规范 (新推章节) ============
    chapter_slug_template: "{novel_slug}-ch{idx:03d}"
    # ============ backups 仓路径 (相对 backups 仓根) ============
    paths:
      outline: novels/carbon_tao_obsidian/outline.md
      outline_meta: novels/carbon_tao_obsidian/outline.meta.json
      style_guide: novels/carbon_tao_obsidian/style_guide.md
      characters: novels/carbon_tao_obsidian/characters.md
      state: novels/carbon_tao_obsidian/state.json
      chapters_dir: novels/carbon_tao_obsidian/chapters/
    created_at: 2026-07-09T00:00:00Z

  # ============================================================
  # 第 2 本 — 元界 (老仓, 老板 7-8 拍板 15:36 后续手工删)
  # ============================================================
  - id: meta_realm_obsidian
    title: 元界
    slug: meta-realm
    description: 一个关于意识、边界与觉醒的科幻故事。
    status: ongoing
    enabled: true           # 7-8 老板拍: 后续手工删, publisher 不动; 测试期间不写
    daily_chapter: true
    target_word_count: 3000
    category: 科幻
    keywords: [意识上传, 月球基地, AI 觉醒]
    volumes:
      - order: 1
        title: "第一卷: 星海之始"
        description: 觉醒前的最后平静。
        start_chapter: 1
        end_chapter: 50
    chapter_slug_template: "{novel_slug}-ch{idx:03d}"
    paths:
      outline: novels/meta_realm_obsidian/outline.md
      outline_meta: novels/meta_realm_obsidian/outline.meta.json
      style_guide: novels/meta_realm_obsidian/style_guide.md
      characters: novels/meta_realm_obsidian/characters.md
      state: novels/meta_realm_obsidian/state.json
      chapters_dir: novels/meta_realm_obsidian/chapters/
    created_at: 2026-07-05T00:00:00Z

  # ============================================================
  # 第 3 本 — 玻璃海 (待审, 老板 7-8 拍可启用)
  # ============================================================
  - id: glass_sea_obsidian
    title: 玻璃海
    slug: glass-sea
    description: 沿海小城, 退潮后海滩上出现的不该存在的东西。
    status: ongoing
    enabled: true           # 7-8 拍: 大纲待审, 暂不开
    daily_chapter: true
    target_word_count: 3000
    category: 玄幻
    keywords: [退潮, 海市蜃楼, 失忆]
    volumes:
      - order: 1
        title: "卷一: 退潮"
        description: 故事开始, 退潮后第一夜。
        start_chapter: 1
        end_chapter: 30
    chapter_slug_template: "{novel_slug}-ch{idx:03d}"
    paths:
      outline: novels/glass_sea_obsidian/outline.md
      outline_meta: novels/glass_sea_obsidian/outline.meta.json
      style_guide: novels/glass_sea_obsidian/style_guide.md
      characters: novels/glass_sea_obsidian/characters.md
      state: novels/glass_sea_obsidian/state.json
      chapters_dir: novels/glass_sea_obsidian/chapters/
    created_at: 2026-07-08T00:00:00Z

# ============================================================
# 推送时间窗 (systemd timer 配置, 这里只声明 publisher 期望节奏)
# 老板 7-8 15:36 拍: 每天 8/12/18 三档, 每档"每本都写 1 章",不是"3 本轮转"
# ============================================================
schedule:
  hours: [8, 12, 18]
  per_run_novel_limit: null
  daily_chapter_target: 3
