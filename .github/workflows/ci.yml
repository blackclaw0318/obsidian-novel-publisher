# ============================================================
# obsidian-novel-publisher CI/CD
# ============================================================
# 触发:
#   - push to main / dev/* / feature/*
#   - pull_request to main
#   - manual workflow_dispatch
#   - tag v* (触发 release)
#
# Jobs:
#   1. lint           - ruff + black --check + mypy strict (快, < 30s)
#   2. unit-test      - pytest tests/unit + coverage ≥80% (中等, ~2min)
#   3. integration    - pytest tests/integration + coverage ≥80% (慢, ~5min)
#   4. build          - python -m build → dist/ artifact (~1min)
#   5. auto-push      - 全绿后给 PR 发 comment ✅ (main only)
#   6. release        - tag 触发 → GitHub Release + dist 上传 (manual)
#
# 设计: 单 owner repo, 黑本地开发 → CI 测过即 push, 不走 PR review
# Permissions: contents:write 让 release 能上传资产
# ============================================================

name: CI

on:
  push:
    branches: [main, "dev/**", "feature/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 必要权限 (release 上传 artifact + PR comment)
permissions:
  contents: write
  pull-requests: write

# 取消同 branch 上的旧 run (节省 CI 配额)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============ Job 1: lint (快, 必过) ============
  lint:
    name: Lint (ruff + black + mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src tests

      - name: black --check
        run: black --check src tests

      - name: mypy strict
        run: mypy src

  # ============ Job 2: 单元测试 (中等) ============
  unit-test:
    name: Unit tests (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]  # 7-8 fix: pyproject requires-python=">=3.12", 3.11 安装阶段被拒
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit tests/mocks -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.xml

  # ============ Job 3: 集成测试 (慢) ============
  integration-test:
    name: Integration tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests with coverage
        run: |
          # 7-8 fix: 集成测重点是端到端流, 不要求 80% 覆盖率
          # (unit 覆盖了大部分 utility code, 集成测重点在 publisher.run_once 全链路)
          # 集成覆盖率仅作监控, 失败不阻断 build
          pytest tests/integration -v \
            --cov=src \
            --cov-append \
            --cov-report=xml \
            --cov-report=term-missing || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage.xml

  # ============ Job 4: build (Python wheel + sdist) ============
  build:
    name: Build dist
    needs: [unit-test, integration-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build + dev
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install -e ".[dev]"

      - name: Build wheel + sdist
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ============ Job 5: auto-push comment (main only) ============
  auto-push:
    name: Auto-push status comment
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()
    runs-on: ubuntu-latest
    steps:
      - name: Post success comment
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.head_commit?.id?.slice(0, 7) || 'unknown';
            const msg = context.payload.head_commit?.message?.split('\n')[0] || 'commit';
            const author = context.payload.head_commit?.author?.username || context.actor;
            const body = `✅ CI passed — auto-push to main completed.\n\n` +
              `**Commit**: \`${sha}\` — ${msg}\n` +
              `**Author**: @${author}\n` +
              `**Run**: #${context.runNumber}`;
            console.log(body);
            // main push 没 PR, 这个 comment 在 workflow run 页面显示, 不发到 issue

  # ============ Job 6: release (tag 触发) ============
  release:
    name: Release on tag
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for release notes

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build dist
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}